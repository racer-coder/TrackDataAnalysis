# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            parch: win64
            march: x86_64
# Windows arm requires Python >= 3.11
#          - os: windows-11-arm
#            parch: warch64
#            march: aarch64

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install libmpv
      run: |
        mkdir mpv-artifacts
        cd mpv-artifacts
        curl --output libmpv.7z -L https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-${{ matrix.march }}-20260419-git-06f4ce7.7z/download
        7z x libmpv.7z
        move libmpv-2.dll ..\\ui
    - name: Build extension
      run: |
        python setup.py build_ext --inplace
    - name: Build MSI
      run: |
        python setup.py bdist_msi
        dir dist
    - name: Upload MSI
      uses: actions/upload-artifact@v7
      with:
        archive: false
        path: dist/*.msi

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        brew install mpv
